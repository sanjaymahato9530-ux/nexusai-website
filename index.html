<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI | Content Automation</title>
    
    <style>
        :root { --bg: #030303; --blue: #00d4ff; --purple: #9d00ff; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; }
        
        .mesh-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; 
                   background: radial-gradient(circle at 50% 50%, #1a0b2e, #030303); }
        
        nav { padding: 20px 10%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; }
        .logo span { color: var(--blue); }
        
        .hero { text-align: center; padding: 100px 10%; }
        .gradient-text { background: linear-gradient(90deg, var(--blue), var(--purple)); 
                         -webkit-background-clip: text; color: transparent; }
        
        .btn-main { background: linear-gradient(90deg, var(--blue), var(--purple)); 
                    padding: 12px 24px; border-radius: 8px; color: white; text-decoration: none; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <nav>
        <div class="logo">NEXUS<span>AI</span></div>
        <div class="nav-links">
            <button class="btn-main" onclick="startAutomation()">Get Started</button>
        </div>
    </nav>

    <header class="hero">
        <h1>Content Creation <br><span class="gradient-text">On Autopilot</span></h1>
        <p>Bina kisi API key ke, content pipeline design karein.</p>
    </header>

    <script>
    async function startAutomation() {
        const API_KEY = "AIzaSyArQFb-O9AxKsZNrfCZjPmQEDt2qbgtAko"; // <--- Apni key yahan daalein
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        alert("Automation shuru ho rahi hai... please wait.");

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Ek professional marketing article likho AI automation ke baare mein." }] }]
                })
            });

            const data = await response.json();
            const resultText = data.candidates[0].content.parts[0].text;
            
            // Result ko screen par dikhane ke liye
            alert("AI ka jawab: " + resultText.substring(0, 100) + "...");
            console.log(resultText);
        } catch (error) {
            console.error("Error:", error);
            alert("API Key check karein ya server down hai.");
        }
    }
    </script>
</body>
</html>
