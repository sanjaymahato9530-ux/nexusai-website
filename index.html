<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Login | NexusAI</title><link rel="stylesheet" href="style.css"></head>

    <div class="mesh-bg"></div>
    <div class="auth-box">
        <h2>Welcome Back</h2>
        <form>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn-main">Login</button>
        </form>
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>

<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Sign Up | NexusAI</title><link rel="stylesheet" href="style.css"></head>
<body>
    <div class="mesh-bg"></div>
    <div class="auth-box">
        <h2>Create Account</h2>
        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>

        </form>
