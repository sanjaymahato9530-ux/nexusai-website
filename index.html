<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI | Content Automation</title>
    
    <style>
        :root { --bg: #030303; --blue: #00d4ff; --purple: #9d00ff; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; }
        
        .mesh-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; 
                   background: radial-gradient(circle at 50% 50%, #1a0b2e, #030303); }
        
        nav { padding: 20px 10%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; }
        .logo span { color: var(--blue); }
        
        .hero { text-align: center; padding: 100px 10%; }
        .gradient-text { background: linear-gradient(90deg, var(--blue), var(--purple)); 
                         -webkit-background-clip: text; color: transparent; }
        
        .btn-main { background: linear-gradient(90deg, var(--blue), var(--purple)); 
                    padding: 12px 24px; border-radius: 8px; color: white; text-decoration: none; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <nav>
        <div class="logo">NEXUS<span>AI</span></div>
        <div class="nav-links">
            <button class="btn-main" onclick="startAutomation()">Get Started</button>
        </div>
    </nav>

    <header class="hero">
        <h1>Content Creation <br><span class="gradient-text">On Autopilot</span></h1>
        <p>Bina kisi API key ke, content pipeline design karein.</p>
    </header>

    <script>
        function startAutomation() {
            console.log("Automation sequence initializing...");
            alert("Simulation Mode: Content Automation Engine started!");
        }
    </script>
</body>
</html>
