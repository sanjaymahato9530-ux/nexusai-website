<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI | Autonomous Intelligence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mesh-bg"></div>
    
    <nav>
        <div class="logo">NEXUS<span>AI</span></div>
        <div class="nav-links">
            <a href="#features">Features</a>
            <a href="#pricing">Pricing</a>
            <a href="login.html" class="btn-sub">Login</a>
            <a href="signup.html" class="btn-main">Get Started</a>
        </div>
    </nav>

    <header class="hero" id="home">
        <h1>Build AI Agents & Automations <br><span class="gradient-text">Without Limits</span></h1>
        <p>Create autonomous systems that scale your business.</p>
        <div class="hero-actions">
            <a href="signup.html" class="btn-main">Get Started</a>
            <a href="#features" class="btn-sub">Learn More</a>
        </div>
    </header>

    <section id="features">
        <h2>Features</h2>
        <div class="grid">
            <div class="card"><h3>AI Agents</h3></div>
            <div class="card"><h3>Multi-Agent Swarms</h3></div>
            <div class="card"><h3>Workflow Sync</h3></div>
        </div>
    </section>

    <section id="pricing">
        <h2>Pricing</h2>
        <div class="pricing-grid">
            <div class="card"><h3>Starter</h3><p>$1,999</p></div>
        </div>
    </section>

    <section id="contact">
        <form id="contactForm">
            <input type="email" placeholder="Business Email" required>
            <button type="submit" class="btn-main">Submit Request</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
